<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Recibo Digital + Comprobante — Barrio Las Palmas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#1F4D3D;
    --verde-claro:#e9f1ec;
    --dorado:#A9853F;
    --crema:#FBF7EC;
    --texto:#22291F;
    --gris:#8A8F86;
    --terracota:#B24B3C;
    --linea:#DCE3DA;
    --radio:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--crema);
    color:var(--texto);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  .wrap{
    max-width:1040px;
    margin:0 auto;
    padding:22px 18px 40px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ── Progreso tipo "historias" ── */
  .progreso{
    display:flex;
    gap:6px;
    margin-bottom:22px;
  }
  .seg{
    flex:1;
    height:4px;
    border-radius:4px;
    background:rgba(31,77,61,0.14);
    overflow:hidden;
    cursor:pointer;
  }
  .seg i{
    display:block;
    height:100%;
    width:0%;
    background:var(--verde);
    transition:width .25s ease;
  }
  .seg.done i{width:100%;}
  .seg.activo i{width:100%;}

  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .marca{
    display:flex;
    align-items:center;
    gap:9px;
  }
  .marca .hoja{
    width:26px;height:26px;border-radius:50%;
    background:var(--verde);
    display:flex;align-items:center;justify-content:center;
    color:var(--dorado);font-size:14px;
  }
  .marca span{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:15px;
    color:var(--verde);
    letter-spacing:.2px;
  }
  .paso-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--gris);
    letter-spacing:.5px;
  }

  /* ── Escenario principal ── */
  .escenario{
    flex:1;
    display:grid;
    grid-template-columns:340px 1fr;
    gap:36px;
    align-items:center;
    min-height:460px;
  }
  @media (max-width:820px){
    .escenario{grid-template-columns:1fr;gap:22px;min-height:auto;}
  }

  /* ── Mockup "teléfono" ── */
  .telefono{
    background:#fff;
    border-radius:26px;
    border:1px solid var(--linea);
    box-shadow:0 18px 40px -18px rgba(31,77,61,0.35);
    padding:8px;
    position:relative;
    min-height:420px;
  }
  .pantalla{
    background:var(--crema);
    border-radius:19px;
    min-height:404px;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .barra-app{
    background:var(--verde);
    color:#fff;
    padding:12px 14px 10px;
    text-align:center;
  }
  .barra-app b{
    font-family:'Fraunces',serif;
    color:var(--dorado);
    font-size:14px;
    display:block;
  }
  .barra-app small{
    font-size:9px;
    opacity:.75;
    display:block;
    margin-top:1px;
  }
  .cuerpo-app{
    padding:12px;
    font-size:12px;
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .fila{
    background:#fff;
    border:1px solid var(--linea);
    border-radius:10px;
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11.5px;
  }
  .fila .lab{color:var(--gris);}
  .fila b{color:var(--texto);}

  .chip{
    display:inline-block;
    font-size:9.5px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
    background:var(--verde-claro);
    color:var(--verde);
  }

  .periodo{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:1px solid var(--linea);
    border-radius:10px;
    padding:7px 9px;
    font-size:11px;
  }
  .periodo .box{
    width:15px;height:15px;border-radius:4px;
    border:1.5px solid var(--dorado);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:#fff;
  }
  .periodo.on .box{background:var(--verde);border-color:var(--verde);}
  .periodo.on{background:var(--verde-claro);}
  .periodo .p-lab{flex:1;color:var(--texto);}
  .periodo .p-monto{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gris);}
  .periodo.on .p-monto{color:var(--verde);font-weight:600;}

  .input-mini{
    background:#fff;
    border:1px solid var(--linea);
    border-radius:8px;
    padding:7px 9px;
    font-size:11px;
    color:var(--gris);
  }
  .input-mini b{color:var(--texto);font-weight:600;}

  .foto-box{
    border:1.5px dashed var(--dorado);
    border-radius:10px;
    padding:10px;
    text-align:center;
    font-size:10.5px;
    color:var(--dorado);
    background:#fffaf0;
  }
  .foto-thumb{
    width:100%;
    border-radius:8px;
    display:block;
    border:1px solid var(--linea);
  }

  .liq-doc{
    background:#fff;
    border:1px solid var(--linea);
    border-radius:10px;
    padding:9px 10px;
    font-size:10px;
  }
  .liq-doc .liq-tit{
    color:var(--verde);
    font-weight:700;
    font-size:10.5px;
  }
  .liq-doc .liq-sub{
    color:var(--gris);
    font-size:9px;
    margin-bottom:6px;
  }
  .liq-tabla{width:100%;border-collapse:collapse;}
  .liq-tabla th{
    text-align:right;
    font-size:8px;
    color:var(--gris);
    font-weight:600;
    padding:3px 0;
    border-bottom:1px solid var(--linea);
  }
  .liq-tabla th:first-child, .liq-tabla td:first-child{text-align:left;}
  .liq-tabla td{
    text-align:right;
    padding:3px 0;
    font-size:9.5px;
  }
  .liq-tabla .liq-mes td{color:var(--gris);font-weight:600;padding-top:6px;}
  .liq-tabla .liq-int{color:var(--terracota);}
  .liq-tabla .liq-tot td{
    border-top:1.5px solid var(--verde);
    font-weight:700;
    color:var(--verde);
    padding-top:5px;
  }
  .liq-warn{
    margin-top:8px;
    background:#fdecea;
    border:1px solid #f3c4bd;
    color:#b3261e;
    font-size:8.5px;
    font-weight:600;
    text-align:center;
    border-radius:6px;
    padding:5px;
  }

  .hoja-recibo{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--linea);
    box-shadow:0 6px 16px -8px rgba(31,77,61,.3);
  }
  .hr-cab{
    background:var(--verde);
    padding:9px 10px 7px;
    text-align:center;
  }
  .hr-cab .hr-t1{color:#fff;font-size:8.5px;}
  .hr-cab .hr-t2{color:var(--dorado);font-family:'Fraunces',serif;font-weight:600;font-size:12px;}
  .hr-cab .hr-t3{color:#d7e6de;font-size:6.5px;}
  .hr-body{padding:9px 11px 11px;font-size:9.5px;}
  .hr-row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
  .hr-num{color:var(--verde);font-family:'Fraunces',serif;font-weight:600;font-size:12px;}
  .hr-fecha{text-align:right;font-size:9.5px;}
  .hr-lab{color:var(--gris);font-size:7.5px;text-transform:uppercase;letter-spacing:.4px;}
  .hr-linea{border-top:1px solid var(--linea);margin:6px 0;}
  .hr-prop{font-weight:600;font-size:10.5px;}
  .hr-lote{color:var(--gris);font-size:8.5px;}
  .hr-concepto{display:flex;justify-content:space-between;font-size:9px;padding:2.5px 0;border-bottom:1px solid #f1f1f1;}
  .hr-forma{display:flex;justify-content:space-between;font-size:8.5px;color:var(--gris);margin-top:5px;}
  .hr-oper{display:flex;justify-content:space-between;font-size:7.5px;color:var(--dorado);font-weight:600;margin-top:2px;}
  .hr-total{
    background:var(--crema);
    border-radius:7px;
    padding:7px 9px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0;
  }
  .hr-total .lab{font-size:8.5px;color:#6b5b3a;}
  .hr-total .val{font-family:'Fraunces',serif;font-weight:600;color:var(--verde);font-size:13px;}
  .hr-qr-row{display:flex;gap:8px;align-items:center;margin-top:4px;}
  .hr-qr{width:32px;height:32px;background:#fff repeating-linear-gradient(45deg,#1F4D3D 0 2.5px,#fff 2.5px 5px);border-radius:4px;flex-shrink:0;border:1px solid var(--linea);}
  .hr-qr-txt{font-size:6.5px;color:var(--gris);line-height:1.3;}
  .hr-qr-txt b{color:var(--texto);font-family:'IBM Plex Mono',monospace;font-size:7px;}
  .hr-firma{margin-top:10px;padding-top:6px;border-top:1px solid var(--linea);font-size:7.5px;color:var(--gris);}
  .hr-firma b{display:block;color:var(--texto);font-size:8.5px;}

  .recibo-mini{
    background:var(--verde);
    border-radius:10px;
    padding:12px;
    color:#fff;
    text-align:center;
  }
  .recibo-mini .n{
    font-family:'Fraunces',serif;
    color:var(--dorado);
    font-size:16px;
  }
  .qr-mini{
    width:52px;height:52px;
    background:#fff repeating-linear-gradient(45deg,#1F4D3D 0 3px,#fff 3px 6px);
    border-radius:6px;
    margin:8px auto 4px;
  }

  .sello-wrap{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .sello{
    width:96px;height:96px;
    border-radius:50%;
    border:3px solid var(--dorado);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:var(--dorado);
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:12px;
    background:rgba(255,255,255,0.85);
    transform:rotate(-18deg) scale(0);
    opacity:0;
    animation:sellar .7s cubic-bezier(.34,1.56,.64,1) forwards;
    animation-delay:.35s;
    text-align:center;
    letter-spacing:.5px;
  }
  .sello span{font-size:20px;margin-bottom:2px;}
  @keyframes sellar{
    0%{transform:rotate(-18deg) scale(0);opacity:0;}
    60%{transform:rotate(-8deg) scale(1.12);opacity:1;}
    100%{transform:rotate(-10deg) scale(1);opacity:1;}
  }

  /* ── Panel de texto ── */
  .panel{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--dorado);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  .titulo{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(24px,3.4vw,34px);
    line-height:1.15;
    color:var(--verde);
    margin:0;
  }
  .titulo em{
    font-style:italic;
    font-weight:500;
    color:var(--dorado);
  }
  .texto{
    font-size:15px;
    line-height:1.55;
    color:#3a4137;
    max-width:52ch;
  }
  .texto b{color:var(--texto);}
  .nota{
    font-size:12.5px;
    color:var(--gris);
    border-left:2px solid var(--dorado);
    padding-left:10px;
  }
  .checklist{
    display:grid;
    gap:8px;
    margin:2px 0 4px;
  }
  .checklist li{
    list-style:none;
    background:#fff;
    border:1px solid var(--linea);
    border-radius:9px;
    padding:8px 11px;
    font-size:13px;
    font-weight:600;
    color:var(--texto);
  }

  /* ── Navegación ── */
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:26px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    border:none;
    border-radius:30px;
    padding:11px 22px;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn.primario{background:var(--verde);color:#fff;}
  .btn.primario:hover{opacity:.92;}
  .btn.fantasma{background:transparent;color:var(--verde);border:1px solid var(--linea);}
  .btn:disabled{opacity:.35;cursor:default;}
  .btn:disabled:active{transform:none;}
  .dots-txt{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--gris);
  }

  .cierre{
    text-align:center;
    max-width:640px;
    margin:0 auto;
  }
  .cierre .titulo{font-size:clamp(26px,4vw,40px);}
  .beneficios{
    text-align:left;
    display:grid;
    gap:10px;
    margin:22px 0;
  }
  .beneficios .b{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:#fff;
    border:1px solid var(--linea);
    border-radius:10px;
    padding:10px 12px;
    font-size:13.5px;
  }
  .beneficios .b .ico{color:var(--dorado);font-size:15px;}

  @media (max-width:820px){
    .escenario{min-height:auto;}
    .telefono{max-width:300px;margin:0 auto;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="progreso" id="progreso"></div>

  <header class="top">
    <div class="marca">
      <div class="hoja">🌴</div>
      <span>Barrio Las Palmas</span>
    </div>
    <div class="paso-num" id="paso-num">01 / 08</div>
  </header>

  <div id="escenario-host"></div>

  <div class="nav">
    <button class="btn fantasma" id="btn-prev">← Atrás</button>
    <span class="dots-txt" id="dots-txt"></span>
    <button class="btn primario" id="btn-next">Siguiente →</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const host = $('#escenario-host');

// ── Contenido de cada paso: mockup (HTML) + panel de texto (HTML) ──
const pasos = [

// 0 — Portada
{
  eyebrow:'Propuesta para revisar',
  titulo:'Recibo digital <em>+ comprobante</em>',
  texto:`Una mejora al circuito de cobranza, para que Juan y Walter la vean paso a paso y decidan si la ponemos en marcha.<br><br>No hace falta entrar a la app real — esto es una demo con datos de ejemplo.`,
  nota:'Preparado por Juana · Julio 2026',
  telefono:`
    <div class="barra-app"><b>Consorcio de Propietarios</b><small>William Cross 3302 · Las Talitas</small></div>
    <div class="cuerpo-app" style="justify-content:center;align-items:center;text-align:center;gap:14px">
      <div style="font-size:34px">🧾</div>
      <div style="font-family:'Fraunces',serif;font-weight:600;color:#1F4D3D;font-size:15px">Recibo Digital</div>
      <div style="color:#8A8F86;font-size:11px;max-width:180px">Cobro → comprobante → recibo con QR verificable</div>
    </div>`
},

// 1 — El problema hoy
{
  eyebrow:'Cómo es hoy',
  titulo:'Todo pasa <em>a mano</em>, tres veces',
  texto:`Hoy: <b>Juan</b> recibe la transferencia y manda el comprobante al grupo. <b>Walter</b> mira ese comprobante y emite el recibo a mano. <b>Juana</b> toma ese recibo y lo vuelve a cargar en la planilla de rendición.<br><br>Es el paso que más tiempo lleva del mes, y donde más se presta a errores de imputación.`,
  telefono:`
    <div class="barra-app"><b>Circuito actual</b><small>3 pasos manuales</small></div>
    <div class="cuerpo-app" style="gap:10px">
      <div class="fila"><span class="lab">1. Juan</span><b>recibe transferencia →</b></div>
      <div class="fila"><span class="lab">2. Walter</span><b>emite recibo a mano →</b></div>
      <div class="fila"><span class="lab">3. Juana</span><b>carga todo a planilla</b></div>
      <div style="text-align:center;margin-top:6px;color:#B24B3C;font-size:11px;font-weight:600">⏱ Es lo que más tiempo lleva</div>
    </div>`
},

// 2 — La Liquidación de Deuda (documento real que ya existe)
{
  eyebrow:'Esto ya existe hoy',
  titulo:'Nace en la <em>Liquidación de Deuda</em>',
  texto:`La app ya genera este documento hoy: la <b>Liquidación de deuda con intereses punitorios</b> de cada lote, calculada al día según el Art. 8° del Reglamento.<br><br>La idea no es crear algo nuevo — es que esta misma liquidación, la que ya usás para mandarle al propietario, sea la que <b>alimenta directo</b> el formulario de cobro. Walter deja de tener que mirar el papel y volver a tipear.`,
  telefono:`
    <div class="barra-app"><b>Liquidación de deuda</b><small>con intereses punitorios</small></div>
    <div class="cuerpo-app">
      <div class="liq-doc">
        <div class="liq-tit">Consorcio Barrio Las Palmas</div>
        <div class="liq-sub">L38 Norte — Campero Liliana (EJEMPLO) · Al 10/7/2026</div>
        <table class="liq-tabla">
          <tr><th>Período / Tipo</th><th>Capital</th><th>Interés</th><th>Subt.</th></tr>
          <tr class="liq-mes"><td colspan="4">May 2026 (57 días)</td></tr>
          <tr><td>Exp. Extraord.</td><td>$61.707</td><td class="liq-int">$4.690</td><td>$66.397</td></tr>
          <tr class="liq-mes"><td colspan="4">Jun 2026 (26 días)</td></tr>
          <tr><td>Exp. Ordinaria</td><td>$90.000</td><td class="liq-int">$3.120</td><td>$93.120</td></tr>
          <tr><td>Exp. Extraord.</td><td>$95.000</td><td class="liq-int">$3.293</td><td>$98.293</td></tr>
          <tr class="liq-tot"><td>TOTAL A COBRAR</td><td>$246.707</td><td>$11.103</td><td>$257.810</td></tr>
        </table>
        <div class="liq-warn">⚠️ Sujeto a verificación</div>
      </div>
    </div>`
},

// 3 — Eso mismo llega al cobro
{
  eyebrow:'Paso 1',
  titulo:'Esa liquidación <em>llega al cobro</em>',
  texto:`Walter abre el cobro del lote y ahí aparece, ya cargada, la misma deuda de la liquidación — ordenada del período <b>más viejo al más nuevo</b>, con los montos listos.<br><br>No hay que ir a buscar nada en otro lado ni recalcular a mano.`,
  telefono:`
    <div class="barra-app"><b>Registrar cobro</b><small>Lote 12 Sur — Fernández R. (EJEMPLO)</small></div>
    <div class="cuerpo-app">
      <div class="fila"><span class="lab">Deuda pendiente</span><span class="chip">⚠️ $283.480</span></div>
      <div class="periodo"><div class="box"></div><span class="p-lab">May ord</span><span class="p-monto">$90.000</span></div>
      <div class="periodo"><div class="box"></div><span class="p-lab">May ext</span><span class="p-monto">$95.000</span></div>
      <div class="periodo"><div class="box"></div><span class="p-lab">Jun ord</span><span class="p-monto">$90.000</span></div>
      <div class="periodo"><div class="box"></div><span class="p-lab">Jun int.</span><span class="p-monto">$8.480</span></div>
    </div>`
},

// 3 — Imputación automática
{
  eyebrow:'Paso 2',
  titulo:'Tilda sola, <em>del más viejo</em>',
  texto:`Walter escribe cuánto pagó el vecino — por ejemplo <b>$185.000</b> — y la app tilda automáticamente los períodos más viejos hasta agotar ese monto.<br><br>Walter puede destildar o escribir un monto distinto a mano si algún período no se cubre entero. Nada queda fuera de su control.`,
  telefono:`
    <div class="barra-app"><b>Registrar cobro</b><small>Monto ingresado: $185.000</small></div>
    <div class="cuerpo-app">
      <div class="periodo on"><div class="box">✓</div><span class="p-lab">May ord</span><span class="p-monto">$90.000</span></div>
      <div class="periodo on"><div class="box">✓</div><span class="p-lab">May ext</span><span class="p-monto">$95.000</span></div>

let idx = 0;

function render(){
  const p = pasos[idx];

  // progreso
  const prog = $('#progreso');
  prog.innerHTML = pasos.map((_,i)=>`<div class="seg ${i<idx?'done':''} ${i===idx?'activo':''}" data-i="${i}"><i></i></div>`).join('');
  prog.querySelectorAll('.seg').forEach(s=>s.addEventListener('click', ()=>{ idx=parseInt(s.dataset.i); render(); }));

  $('#paso-num').textContent = String(idx+1).padStart(2,'0') + ' / ' + String(pasos.length).padStart(2,'0');
  $('#dots-txt').textContent = (idx+1) + ' de ' + pasos.length;

  $('#btn-prev').disabled = idx===0;
  $('#btn-next').textContent = idx===pasos.length-1 ? 'Volver al inicio ↺' : 'Siguiente →';

  if(p.cierre){
    host.innerHTML = `
      <div class="cierre">
        <div class="eyebrow">${p.eyebrow}</div>
        <h1 class="titulo">${p.titulo}</h1>
        <div class="beneficios">
          ${p.beneficios.map(b=>`<div class="b"><span class="ico">${b[0]}</span><span>${b[1]}</span></div>`).join('')}
        </div>
        <div class="texto" style="margin:0 auto">${p.texto}</div>
      </div>`;
    return;
  }

  host.innerHTML = `
    <div class="escenario">
      <div class="telefono"><div class="pantalla">${p.telefono}</div></div>
      <div class="panel">
        <div class="eyebrow">${p.eyebrow}</div>
        <h1 class="titulo">${p.titulo}</h1>
        <div class="texto">${p.texto}</div>
        ${p.bullets ? `<ul class="checklist">${p.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : ''}
        ${p.notaFinal ? `<div class="texto">${p.notaFinal}</div>` : ''}
        ${p.nota ? `<div class="nota">${p.nota}</div>` : ''}
      </div>
    </div>`;
}

$('#btn-prev').addEventListener('click', ()=>{ if(idx>0){ idx--; render(); } });
$('#btn-next').addEventListener('click', ()=>{
  if(idx<pasos.length-1){ idx++; } else { idx=0; }
  render();
});
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') $('#btn-next').click();
  if(e.key==='ArrowLeft') $('#btn-prev').click();
});

// swipe táctil simple
let touchX=null;
document.addEventListener('touchstart', e=>{ touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 60){ dx<0 ? $('#btn-next').click() : $('#btn-prev').click(); }
  touchX = null;
});

render();
</script>
